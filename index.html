<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weights and Measures Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin: 0; }
        #map { height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>

        const map = L.map('map').setView([40.4406, -79.9959], 10);

        //basemap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        fetch('https://bwm.dravenbc.com/stores')
            .then(response => response.json())
            .then(data => {
                data.forEach(store => {
                    const geom = JSON.parse(store.geom);
                    const coords = geom.coordinates;
                    L.marker([coords[1], coords[0]]).addTo(map);
                });
            });
    </script>
</body>
</html>
