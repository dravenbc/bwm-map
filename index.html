<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weights and Measures Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        #header { text-align: center; height: 10vh; }
        body { margin: 0; display: flex; flex-direction: column;   height: 100vh;}
        #content { display: flex; flex: 1; }
        #sidebar { flex: 1; padding: 1rem; overflow-y: auto;}
        #map { flex: 2; }
        
    </style>
</head>
<body>
    <div id = "header">
        <h1>Allegheny County, PA Weights and Measures Inspections</h1>
    </div>

    <div id = content>

        <div id="sidebar">
            <p id="prompt">Click a store to view more information.</p>
            <h2 id="store-name"></h2>
            <ul id="inspection-list"></ul>
        </div>

        <div id="map"></div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>

        const map = L.map('map').setView([40.4406, -79.9959], 10);

        //basemap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        fetch('https://bwm.dravenbc.com/stores')
            .then(response => response.json())
            .then(data => {
                data.forEach(store => {
                    const geom = JSON.parse(store.geom);
                    const coords = geom.coordinates;
                    const marker = L.marker([coords[1], coords[0]]).addTo(map);
                
                    marker.on('click', () => {
                        //show store name on sidebar
                        document.getElementById('prompt').style.display = 'none';
                        document.getElementById('store-name').textContent = store.store_name;

                        //call API to get list of inspections
                        fetch(`https://bwm.dravenbc.com/store_inspections?store_id=${store.store_id}`)
                            .then(response => response.json())
                            .then(inspections => {
                                const list = document.getElementById('inspection-list');
                                list.innerHTML = '';

                                inspections.forEach(inspection => {
                                    const li = document.createElement('li');
                                    li.textContent = `${inspection.date} — ${inspection.device_group} — ${inspection.result}`;
                                    list.appendChild(li);
                                });
                            });
                    })
                });
            });
    </script>
</body>
</html>
